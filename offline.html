<!DOCTYPE html>
<html lang="en-NG">
<head>
  <meta charset="utf-8">
  <title>You're offline — Goallord Creativity</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#D66A1F">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Goallord">
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/assets/images/logo/favicon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/icons/apple-touch-icon-180.png">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: #0d0f14;
      color: #e7e7e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-bottom: max(24px, env(safe-area-inset-bottom));
    }
    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 16px;
      background: #D66A1F;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 16px 48px rgba(214, 106, 31, .25);
    }
    .logo img { width: 40px; height: 40px; }
    h1 {
      font-size: 24px;
      margin: 0 0 8px;
      letter-spacing: -0.01em;
    }
    p {
      color: #9aa0a8;
      font-size: 15px;
      line-height: 1.55;
      margin: 0 0 24px;
    }
    .row {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 18px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border: 1px solid transparent;
      cursor: pointer;
      transition: opacity .15s ease, transform .15s ease;
    }
    .btn:hover { opacity: .9; }
    .btn:active { transform: translateY(1px); }
    .btn-primary { background: #D66A1F; color: #fff; }
    .btn-ghost  { background: transparent; color: #e7e7e7; border-color: #2a2e36; }
    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #ff5a5a;
      vertical-align: middle;
      margin-right: 6px;
      box-shadow: 0 0 0 4px rgba(255, 90, 90, .12);
    }
    @media (prefers-reduced-motion: reduce) {
      .btn { transition: none; }
    }
  </style>
</head>
<body>
  <main class="card" role="main">
    <div class="logo" aria-hidden="true">
      <img src="/assets/images/logo/favicon.svg" alt="">
    </div>
    <h1><span class="dot" aria-hidden="true"></span>You're offline</h1>
    <p>We can't reach Goallord Creativity right now. Check your connection and try again — your installed app will keep recently visited pages working.</p>
    <div class="row">
      <button class="btn btn-primary" onclick="location.reload()">Try again</button>
      <a class="btn btn-ghost" href="/">Go to home</a>
    </div>
  </main>
  <script>
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
